app = "line-homework-bot"
primary_region = "nrt"

[build]

[env]
TZ = "Asia/Taipei"
DATABASE_URL = "sqlite:////data/bot.db"
PHOTO_DIR = "/data/photos"
LOG_LEVEL = "INFO"

[[mounts]]
source = "data"
destination = "/data"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
timeout = "5s"
path = "/health"

[[vm]]
size = "shared-cpu-1x"
memory = "256mb"
